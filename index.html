<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimul — Particle Portrait</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #040810;
    color: #e8edf5;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: none;
  }
  #canvas-container {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; }
  #cursor {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(0,255,200,0.9);
    transform: translate(-50%, -50%);
    transition: transform 0.05s;
    box-shadow: 0 0 12px rgba(0,255,200,0.6), 0 0 24px rgba(0,255,200,0.2);
  }
  #cursor-ring {
    position: fixed;
    pointer-events: none;
    z-index: 99;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(0,255,200,0.35);
    transform: translate(-50%, -50%);
    transition: transform 0.12s ease-out, width 0.2s, height 0.2s;
  }
  #ui-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px 48px;
  }
  .tag {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(0,255,200,0.5);
    text-transform: uppercase;
  }
  .name-block h1 {
    font-family: 'Georgia', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: #e8edf5;
    margin-top: 10px;
  }
  .name-block h1 span {
    color: rgba(0,255,200,0.85);
  }
  .name-block p {
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(232,237,245,0.4);
    margin-top: 12px;
    text-transform: uppercase;
  }
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .stat {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(0,255,200,0.4);
    line-height: 1.8;
  }
  .stat strong {
    display: block;
    font-size: 20px;
    color: rgba(0,255,200,0.7);
    font-weight: 400;
    letter-spacing: 0;
  }
  .links {
    display: flex;
    gap: 24px;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(232,237,245,0.3);
    text-transform: uppercase;
  }
  .links a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s;
    pointer-events: all;
  }
  .links a:hover { color: rgba(0,255,200,0.8); }
  #hint {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(0,255,200,0.25);
    text-transform: uppercase;
    text-align: center;
    position: fixed;
    bottom: 24px;
    width: 100%;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  #loading {
    position: fixed;
    inset: 0;
    background: #040810;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 999;
    transition: opacity 0.8s;
  }
  #loading .l-text {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(0,255,200,0.6);
    text-transform: uppercase;
  }
  #loading .bar {
    width: 160px;
    height: 1px;
    background: rgba(0,255,200,0.15);
    position: relative;
    overflow: hidden;
  }
  #loading .bar::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: rgba(0,255,200,0.7);
    animation: load 1.2s ease-in-out forwards;
  }
  @keyframes load { to { left: 100%; } }
</style>
</head>
<body>

<div id="loading">
  <div class="l-text">Initializing particles</div>
  <div class="bar"></div>
</div>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="canvas-container">
  <canvas id="c"></canvas>
</div>

<div id="ui-overlay">
  <div class="name-block">
    <div class="tag">Portfolio — 2026</div>
    <h1>Kimul<br><span>Studio.</span></h1>
    <p>Web · Creative · Build</p>
  </div>
  <div class="bottom-row">
    <div class="stat">
      <strong id="p-count">0</strong>
      ACTIVE PARTICLES
    </div>
    <div class="links">
      <a href="https://github.com/ne-he/kimul" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="#">LinkedIn</a>
      <a href="#">Projects</a>
    </div>
  </div>
</div>

<div id="hint">Move cursor to scatter particles</div>

<script>
(function() {
  const IMG_SRC = './portrait.png';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const loadEl = document.getElementById('loading');
  const pCountEl = document.getElementById('p-count');
  const cursorEl = document.getElementById('cursor');
  const cursorRingEl = document.getElementById('cursor-ring');

  let W, H, dpr;
  let mouse = { x: -9999, y: -9999 };
  let particles = [];
  let raf;
  let hintShown = true;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top = e.clientY + 'px';
    cursorRingEl.style.left = e.clientX + 'px';
    cursorRingEl.style.top = e.clientY + 'px';
    if (hintShown) {
      document.getElementById('hint').style.opacity = '0';
      hintShown = false;
    }
  });

  window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

  window.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
  }, { passive: false });

  window.addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

  class Particle {
    constructor(ox, oy, r, g, b, a) {
      this.ox = ox;
      this.oy = oy;
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.vx = 0;
      this.vy = 0;
      this.r = r; this.g = g; this.b = b; this.a = a;
      this.size = 1.2 + Math.random() * 0.8;
      /* Same feel as Nehemiah demo, but softer spring so particles settle back home more slowly */
      this.stiffness = 0.016 + Math.random() * 0.01;
      this.damping = 0.89 + Math.random() * 0.028;
      this.repulseRadius = 90 + Math.random() * 40;
      this.repulseStrength = 6 + Math.random() * 4;
      this.alpha = 0;
      this.targetAlpha = (a / 255) * 0.85;
    }

    update(mx, my) {
      const fx = (this.ox - this.x) * this.stiffness;
      const fy = (this.oy - this.y) * this.stiffness;

      this.vx += fx;
      this.vy += fy;

      const dx = this.x - mx;
      const dy = this.y - my;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < this.repulseRadius) {
        const force = (1 - dist / this.repulseRadius);
        const angle = Math.atan2(dy, dx);
        this.vx += Math.cos(angle) * force * this.repulseStrength;
        this.vy += Math.sin(angle) * force * this.repulseStrength;
      }

      this.vx *= this.damping;
      this.vy *= this.damping;

      this.x += this.vx;
      this.y += this.vy;

      if (this.alpha < this.targetAlpha) {
        this.alpha = Math.min(this.alpha + 0.012, this.targetAlpha);
      }
    }

    draw() {
      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      const tint = Math.min(speed / 8, 1);

      const nr = Math.round(this.r + (0 - this.r) * tint * 0.6);
      const ng = Math.round(this.g + (255 - this.g) * tint * 0.5);
      const nb = Math.round(this.b + (200 - this.b) * tint * 0.7);

      ctx.fillStyle = `rgba(${nr},${ng},${nb},${this.alpha})`;
      ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
    }
  }

  function extractAndBuild(img) {
    const SAMPLE = 3;
    const MAX = 18000;

    const oc = document.createElement('canvas');
    const scale = Math.min(1, Math.min((W * 0.38) / img.width, (H * 0.82) / img.height));
    oc.width = Math.round(img.width * scale);
    oc.height = Math.round(img.height * scale);
    const octx = oc.getContext('2d');
    octx.drawImage(img, 0, 0, oc.width, oc.height);

    const data = octx.getImageData(0, 0, oc.width, oc.height).data;

    const offX = (W - oc.width) / 2;
    const offY = (H - oc.height) / 2;

    particles = [];
    let count = 0;

    for (let i = 0; i < data.length; i += 4 * SAMPLE) {
      if (count >= MAX) break;
      const a = data[i + 3];
      if (a < 60) continue;
      const idx = i / 4;
      const px = (idx % oc.width) + offX;
      const py = Math.floor(idx / oc.width) + offY;
      particles.push(new Particle(px, py, data[i], data[i+1], data[i+2], a));
      count++;
    }

    pCountEl.textContent = particles.length.toLocaleString();

    loadEl.style.opacity = '0';
    setTimeout(() => loadEl.style.display = 'none', 800);
    startLoop();
  }

  function startLoop() {
    function frame() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(4,8,16,0.18)';
      ctx.fillRect(0, 0, W, H);

      for (let i = 0; i < particles.length; i++) {
        particles[i].update(mouse.x, mouse.y);
        particles[i].draw();
      }

      raf = requestAnimationFrame(frame);
    }
    frame();
  }

  const img = new Image();
  img.onload = () => extractAndBuild(img);
  img.onerror = () => {
    loadEl.innerHTML = '<div class="l-text" style="color:rgba(255,80,80,0.7)">Image load failed</div>';
  };
  img.src = IMG_SRC;

})();
</script>

</body>
</html>
